{{- include "besu-sandbox.validateGenesis" . -}}
{{/*
  genesis.json — londonBlock / zeroBaseFee are injected when genesis.london=true
  (see values.yaml comments).
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-genesis
  labels:
    {{- include "besu-sandbox.labels" . | nindent 4 }}
data:
  genesis.json: |-
    {
      "config": {
        "chainId": 1337,
        "constantinoplefixblock": 0,
        {{- if eq (include "besu-sandbox.genesisLondon" .) "true" }}
        "londonBlock": 0,
        "zeroBaseFee": true,
        {{- end }}
        "{{ include "besu-sandbox.consensusGenesisKey" . }}": {
          "blockperiodseconds": {{ .Values.consensusConfig.blockperiodseconds }},
          "epochlength": {{ .Values.consensusConfig.epochlength }},
          "requesttimeoutseconds": {{ .Values.consensusConfig.requesttimeoutseconds }}
        }
      },
      "nonce": "0x0",
      "timestamp": "0x58ee40ba",
