# Checkov config for rendered Kubernetes manifests (see scripts/checkov-scan.sh).
# Skip rationale is documented inline below each skipped check.
branch: main
compact: true
framework:
  - kubernetes

skip-check:
  # CKV_K8S_8 — Liveness probe should be configured.
  # Exempt: Besu validators probe /liveness on JSON-RPC; init curl and helm test
  # hook pods have no liveness probe.
  - CKV_K8S_8

  # CKV_K8S_9 — Readiness probe should be configured.
  # Exempt: Validators intentionally use /liveness for readiness (Besu /readiness
  # requires peers and deadlocks cold start). Init and helm test pods unprobed.
  - CKV_K8S_9

  # CKV_K8S_10 — CPU requests should be set.
  # Exempt: Init container and helm test hook omit resources — sandbox only.
  - CKV_K8S_10

  # CKV_K8S_11 — CPU limits should be set.
  # Exempt: Same — ephemeral init/test containers not production-sized.
  - CKV_K8S_11

  # CKV_K8S_12 — Memory requests should be set.
  # Exempt: Same as CKV_K8S_10/11.
  - CKV_K8S_12

  # CKV_K8S_13 — Memory limits should be set.
  # Exempt: Same — init curl and helm test pod only.
  - CKV_K8S_13

  # CKV_K8S_15 — Image pull policy should be Always.
  # Exempt: IfNotPresent is fine for public hyperledger/besu on kind/minikube.
  - CKV_K8S_15

  # CKV_K8S_20 — Containers should not run with allowPrivilegeEscalation.
  # Exempt: Pod securityContext not hardened — local sandbox, not production.
  - CKV_K8S_20

  # CKV_K8S_21 — The default namespace should not be used.
  # Exempt: helm template output lacks release namespace; real installs use -n besu.
  - CKV_K8S_21

  # CKV_K8S_22 — Use a read-only root filesystem where possible.
  # Exempt: Besu writes chain state to /data — writable root FS is required.
  - CKV_K8S_22

  # CKV_K8S_23 — Minimize the admission of root containers.
  # Exempt: Besu image runs as root; not restricted in this sandbox chart.
  - CKV_K8S_23

  # CKV_K8S_28 — Minimize admission of containers with the NET_RAW capability.
  # Exempt: Capabilities not dropped — defer to production hardening.
  - CKV_K8S_28

  # CKV_K8S_29 — Apply security context to your pods and containers.
  # Exempt: No pod-level securityContext — sandbox only.
  - CKV_K8S_29

  # CKV_K8S_30 — Apply security context to your containers.
  # Exempt: No container securityContext — sandbox only.
  - CKV_K8S_30

  # CKV_K8S_31 — Seccomp profile should be docker/default or runtime/default.
  # Exempt: Seccomp not configured — sandbox only.
  - CKV_K8S_31

  # CKV_K8S_37 — Minimize admission of containers with capabilities assigned.
  # Exempt: No capabilities hardening — sandbox only.
  - CKV_K8S_37

  # CKV_K8S_38 — ServiceAccount tokens should only be auto-mounted where needed.
  # Exempt: Validators use ServiceAccounts for secret/RBAC access patterns.
  - CKV_K8S_38

  # CKV_K8S_40 — Containers should run with a high UID to avoid host conflict.
  # Exempt: runAsUser not set — sandbox only.
  - CKV_K8S_40

  # CKV_K8S_43 — Container image should use an immutable digest, not tag alone.
  # Exempt: Tag tracks Chart appVersion; digest pin impractical for dev loops.
  - CKV_K8S_43

  # CKV2_K8S_6 — Minimize admission of pods lacking a NetworkPolicy.
  # Exempt: networkPolicy.enabled=false by default; helm test pod never covered.
  - CKV2_K8S_6
