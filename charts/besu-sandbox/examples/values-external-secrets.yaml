# Example: validator keys from External Secrets Operator (Vault / AWS SM).
# Requires ESO + ClusterSecretStore installed; remote secrets pre-populated.
# See doc/validator-keys-and-external-secrets.md

validatorKeys:
  source: externalSecrets
  externalSecrets:
    secretStoreRef:
      name: aws-secrets-manager
      kind: ClusterSecretStore
    remoteRef:
      keyTemplate: "besu-sandbox/validator{{n}}"
      property: nodekey

